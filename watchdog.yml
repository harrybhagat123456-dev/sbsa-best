name: Render Account Watchdog
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot & switch account if down
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ACTIVE_SLOT: ${{ vars.ACTIVE_SLOT }}
          RENDER_ACCOUNTS: ${{ vars.RENDER_ACCOUNTS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, json, requests, time

          # ── Load all accounts from the JSON variable ───────────────────────
          raw = os.environ.get("RENDER_ACCOUNTS", "[]")
          accounts = json.loads(raw)

          if not accounts:
              print("[WATCHDOG] No accounts in RENDER_ACCOUNTS variable. Exiting.")
              exit(0)

          active = int(os.environ.get("ACTIVE_SLOT", "1")) - 1  # 0-indexed
          if active >= len(accounts):
              active = 0  # safety reset

          GH_PAT = os.environ["GH_PAT"]
          REPO   = os.environ["GITHUB_REPOSITORY"]

          GH_HEADERS = {
              "Authorization": f"Bearer {GH_PAT}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def is_alive(url):
              try:
                  r = requests.get(f"{url}/health", timeout=15)
                  return r.status_code == 200
              except:
                  return False

          def render_action(api_key, svc_id, action):
              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
              r = requests.post(
                  f"https://api.render.com/v1/services/{svc_id}/{action}",
                  headers=headers, timeout=15
              )
              print(f"[RENDER] {action} {svc_id} -> {r.status_code}")

          def update_active_slot(new_slot_1indexed):
              var_url = f"https://api.github.com/repos/{REPO}/actions/variables/ACTIVE_SLOT"
              r = requests.patch(var_url, headers=GH_HEADERS,
                                 json={"name": "ACTIVE_SLOT", "value": str(new_slot_1indexed)},
                                 timeout=10)
              if r.status_code == 404:
                  requests.post(
                      f"https://api.github.com/repos/{REPO}/actions/variables",
                      headers=GH_HEADERS,
                      json={"name": "ACTIVE_SLOT", "value": str(new_slot_1indexed)},
                      timeout=10
                  )
              print(f"[GH] ACTIVE_SLOT -> {new_slot_1indexed}")

          total = len(accounts)
          current = accounts[active]

          print(f"[WATCHDOG] {total} account(s) registered. Checking slot {active+1}: {current['url']}")

          if is_alive(current["url"]):
              print(f"[WATCHDOG] Slot {active+1} is alive. Done.")
          else:
              print(f"[WATCHDOG] Slot {active+1} is DOWN. Switching...")

              # Suspend current
              render_action(current["api_key"], current["service_id"], "suspend")

              # Find next slot (cycles through all accounts)
              next_active = (active + 1) % total
              next_acc = accounts[next_active]

              print(f"[WATCHDOG] Activating slot {next_active+1}: {next_acc['url']}")
              render_action(next_acc["api_key"], next_acc["service_id"], "resume")

              time.sleep(30)   # wait for Render to spin up
              update_active_slot(next_active + 1)
              print(f"[WATCHDOG] Switched to slot {next_active+1}!")
          EOF
